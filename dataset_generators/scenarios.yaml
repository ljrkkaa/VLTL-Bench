# ------------------------------------------------------------------------------
# Scenario configuration for the NL↔LTL dataset generator
#
# A scenario block contains:
#   locations:   admissible place names written with underscores
#
#   actions:     every verb the agent may execute, specified as
#                  <verb>:
#                      role:    ego | <target‑type>
#                      params:  [] | [item] | [location] | [ego] | ...
#
#                ── Interpretation of param kinds ─────────────────────────────
#                  item       – an arbitrary object from object_names.txt
#                  location   – one of the *locations* listed in this scenario
#                  ego        – the agent itself (for zero‑arg ego actions)
#                  any other  – canonical name of a target class (e.g. person)
#
#   targets:     entity classes the agent reasons about
#                  <type>:
#                      properties: [state‑var, …]     # observable booleans / enums
# ------------------------------------------------------------------------------
warehouse:
  locations: [loading_dock, shelf, storage, warehouse_floor, office, entrance, exit, hallway]

  actions:
    # ego‑only ---------------------------------------------------------------
    idle:
      role:    ego
      params:  []                  # idle()

    get_help:
      role:    ego
      params:  []                  # get_help()

    inspect:
      role:    ego
      params:  [item]              # inspect(item)

    monitor:
      role:    ego
      params:  [item]              # monitor(item)

    # one‑argument (item) ----------------------------------------------------
    search:
      role:    ego
      params:  [item]              # search(item)

    pickup:
      role:    ego
      params:  [item]              # pickup(item)

    carry:
      role:    ego
      params:  [item]              # carry(item)

    collect:
      role:    ego
      params:  [item]              # collect(item)

    avoid:
      role:    ego
      params:  [item]              # avoid(item)

    navigate:
      role:    ego
      params:  [item]              # navigate(item)

    # two‑argument (item, destination) --------------------------------------
    deliver:
      role:    ego
      params:  [item, location]    # deliver(item, location)

    place:
      role:    ego
      params:  [item, location]    # place(item, location)

    stack:
      role:    ego
      params:  [item, location]    # stack(item, location)

    organize:
      role:    ego
      params:  [item, location]    # organize(item, location)

    assist:
      role:    ego
      params:  [item, location]    # assist(item, location)

    secure:
      role:    ego
      params:  [item, location]    # secure(item, location)

  targets:
    item:
      properties: [name]



traffic_light:
  locations: [north, south, east, west, intersection, crosswalk, downtown, highway, downtown_intersection]

  actions:
    # ego‑only ---------------------------------------------------------------
    get_help:
      role:    ego
      params:  []                        # get_help()

    idle:
      role:    ego
      params:  []                        # idle()

    monitor:
      role:    ego
      params:  [traffic_target]          # monitor(target)

    # control a traffic light -----------------------------------------------
    change:
      role:    ego
      params:  [light, color]            # change(light_id, color)

    activate:
      role:    ego
      params:  [light]                   # activate(light)

    deactivate:
      role:    ego
      params:  [light]                   # deactivate(light)

    signal:
      role:    ego
      params:  [traffic_target, lane]    # signal(target, lane)

    control:
      role:    ego
      params:  [light]                   # control(light)

    # observation actions ----------------------------------------------------
    record:
      role:    ego
      params:  [traffic_target, lane]

    photo:
      role:    ego
      params:  [traffic_target, lane]

    navigate:
      role:    ego
      params:  [location]                 # navigate(location)

    avoid:
      role:    ego
      params:  [traffic_target]           # avoid(target)

  targets:
    light:
      properties: [position, color]      # position ∈ {north,…}, color ∈ {red,yellow,green}

    pedestrian:
      properties: [position, status]     # status ∈ {waiting, crossing}

    car:
      properties: [lane, speed]



search_and_rescue:
  locations: [home_base, structure, building, rooftop, basement, parking_lot, entrance, exit, hallway, stairwell, elevator]

  actions:
    # ego‑only ---------------------------------------------------------------
    go_home:
      role:    ego
      params:  []                        # go_home()

    get_help:
      role:    ego
      params:  []                        # get_help()

    idle:
      role:    ego
      params:  []                        # idle()

    # person‑centred actions -------------------------------------------------
    communicate:
      role:    ego
      params:  [person]                  # communicate(person)

    deliver_aid:
      role:    ego
      params:  [person]                  # deliver_aid(person)

    assist:
      role:    ego
      params:  [person]                  # assist(person)

    rescue:
      role:    ego
      params:  [person]                  # rescue(person)

    locate:
      role:    ego
      params:  [person]                  # locate(person)

    # threat‑centred actions -------------------------------------------------
    record:
      role:    ego
      params:  [sr_target]

    photo:
      role:    ego
      params:  [sr_target]

    avoid:
      role:    ego
      params:  [threat]                  # avoid(threat)

    monitor:
      role:    ego
      params:  [threat]                  # monitor(threat)

    secure:
      role:    ego
      params:  [threat]                  # secure(threat)

    navigate:
      role:    ego
      params:  [location]                # navigate(location)

    search:
      role:    ego
      params:  [item]                    # search(item)

    pickup:
      role:    ego
      params:  [item]                    # pickup(item)

    deliver:
      role:    ego
      params:  [item, location]          # deliver(item, location)

  targets:
    person:
      properties: [injured, trapped, safe]

    threat:
      properties: [active, neutralised]
